name: Create personal info files

on:
  workflow_call:

permissions:
  contents: read

jobs:
  create_personal_info_files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Create personal info files
        run: |
          set -euo pipefail

          mkdir -p other_material
          printf '%s\n' "$PERSONAL_INFO_DK_TEX" > other_material/personal_info_dk.tex
          printf '%s\n' "$PERSONAL_INFO_SE_TEX" > other_material/personal_info_se.tex
