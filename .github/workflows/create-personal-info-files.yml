name: Create personal info files

on:
  workflow_call:
    secrets:
      PERSONAL_INFO_DK_TEX:
        required: true
      PERSONAL_INFO_SE_TEX:
        required: true

permissions:
  contents: read

jobs:
  create_personal_info_files:
    runs-on: ubuntu-latest

    steps:
      - name: Create personal info files
        env:
          PERSONAL_INFO_DK_TEX: ${{ secrets.PERSONAL_INFO_DK_TEX }}
          PERSONAL_INFO_SE_TEX: ${{ secrets.PERSONAL_INFO_SE_TEX }}
        run: |
          set -euo pipefail

          mkdir -p other_material
          printf '%s\n' "$PERSONAL_INFO_DK_TEX" > secrets/personal_info_dk.tex
          printf '%s\n' "$PERSONAL_INFO_SE_TEX" > secrets/personal_info_se.tex
