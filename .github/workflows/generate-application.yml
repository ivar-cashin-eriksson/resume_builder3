name: Generate application materials

on:
  issues:
    types: [labeled]

  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to generate materials for"
        required: true
        type: string

jobs:
  vars:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.user.login == 'ivar-cashin-eriksson' &&
        contains(github.event.issue.labels.*.name, 'job-application')
      )
    permissions:
      contents: read
      issues: read
    uses: ./.github/workflows/vars.yml
    with:
      issue_number: ${{ github.event.issue.number || inputs.issue_number }}

  generate_patch:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    needs: vars

    outputs:
      has_patch: ${{ steps.diff.outputs.has_patch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

# ---------------- Run GPT to generate application patch ----------------
      - name: Prepare application context and prompt files
        env:
          ISSUE_TITLE: ${{ needs.vars.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.vars.outputs.issue_body }}
          ISSUE_LABELS: ${{ needs.vars.outputs.issue_labels }}
          LISTING_SLUG: ${{ needs.vars.outputs.listing_slug }}
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: bash .github/scripts/prepare_application_prompts.sh

      - name: Run listing briefing
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/briefing_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="live"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/briefing_summary.md
          safety-strategy: drop-sudo

      - name: Validate briefing output
        env:
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: bash .github/scripts/validate_application_outputs.sh briefing

      - name: Generate draft package
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/generator_prompt.md
          model: gpt-5.4-mini
          effort: medium
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/generator_summary.md
          safety-strategy: drop-sudo

      - name: Run fit critic
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/fit_critic_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/fit_critic_summary.md
          safety-strategy: drop-sudo

      - name: Run style critic
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/style_critic_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/style_critic_summary.md
          safety-strategy: drop-sudo

      - name: Validate critic outputs
        run: bash .github/scripts/validate_application_outputs.sh critics

      - name: Revise draft from critiques
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/revision_prompt.md
          model: gpt-5.4-mini
          effort: medium
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/revision_summary.md
          safety-strategy: drop-sudo
# ----------------------------------------------------------------------

      - name: Create patch artifact
        id: diff
        env:
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: |
          set -euo pipefail

          outside_changes=$(git status --porcelain --untracked-files=all -- . ":(exclude)$OUTPUT_DIR")

          if [ -n "$outside_changes" ]; then
            echo "Unexpected changes outside $OUTPUT_DIR:" >&2
            printf '%s\n' "$outside_changes" >&2
            exit 1
          fi

          git add -N "$OUTPUT_DIR"
          git diff --binary HEAD -- "$OUTPUT_DIR" > /tmp/codex.patch

          if [ -s /tmp/codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload patch artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex.patch
          path: /tmp/codex.patch
          if-no-files-found: error

      - name: Upload summary artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: application-summaries
          path: |
            .github/codex/runtime/generator_summary.md
            .github/codex/runtime/revision_summary.md
          if-no-files-found: error

  render_documents:
    needs:
      - vars
      - generate_patch
    if: needs.generate_patch.outputs.has_patch == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/render-documents.yml
    with:
      output_dir: ${{ needs.vars.outputs.output_dir }}
      input_patch_artifact_name: codex.patch
      output_patch_artifact_name: rendered.patch

  open_pr:
    needs:
      - vars
      - render_documents
    if: needs.render_documents.outputs.has_patch == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: read
    uses: ./.github/workflows/open-pr.yml
    with:
      issue_number: ${{ needs.vars.outputs.issue_number }}
      issue_title: ${{ needs.vars.outputs.issue_title }}
      branch_name: ${{ needs.vars.outputs.branch_name }}
      patch_artifact_name: rendered.patch
      summary_artifact_name: application-summaries
      pr_title: "Application materials: ${{ needs.vars.outputs.issue_title }}"
      commit_message: "Generate application materials for issue #${{ needs.vars.outputs.issue_number }}"
      labels: application-draft
