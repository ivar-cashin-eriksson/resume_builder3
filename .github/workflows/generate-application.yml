name: Generate application materials

on:
  issues:
    types: [labeled]

  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to generate materials for"
        required: true
        type: string

jobs:
  vars:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.user.login == 'ivar-cashin-eriksson' &&
        contains(github.event.issue.labels.*.name, 'job-application')
      )
    permissions:
      contents: read
      issues: read
    uses: ./.github/workflows/vars.yml
    with:
      issue_number: ${{ github.event.issue.number || inputs.issue_number }}

  generate_patch:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    needs: vars

    outputs:
      has_patch: ${{ steps.diff.outputs.has_patch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      # ---------- Run GPT to generate application patch ---------------
      - name: Prepare application context and prompt files
        env:
          ISSUE_TITLE: ${{ needs.vars.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.vars.outputs.issue_body }}
          ISSUE_LABELS: ${{ needs.vars.outputs.issue_labels }}
          LISTING_SLUG: ${{ needs.vars.outputs.listing_slug }}
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: bash .github/scripts/prepare_application_prompts.sh

      - name: Run listing briefing
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/briefing_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="live"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/briefing_summary.md
          codex-home: .github/codex/home/briefing
          safety-strategy: unsafe

      - name: Validate briefing output
        env:
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: bash .github/scripts/validate_application_outputs.sh briefing

      # Each Codex step gets its own home so generated action config 
      # stays isolated. The first Codex step drops sudo for the rest of
      # this job. Later calls use unsafe so the action does not try to 
      # drop sudo again.
      - name: Generate draft package
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/generator_prompt.md
          model: gpt-5.4-mini
          effort: medium
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/generator_summary.md
          codex-home: .github/codex/home/generator
          safety-strategy: unsafe

      - name: Run fit critic
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/fit_critic_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/fit_critic_summary.md
          codex-home: .github/codex/home/fit_critic
          safety-strategy: unsafe

      - name: Run style critic
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/style_critic_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/style_critic_summary.md
          codex-home: .github/codex/home/style_critic
          safety-strategy: unsafe

      - name: Validate critic outputs
        run: bash .github/scripts/validate_application_outputs.sh critics

      - name: Revise draft from critiques
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/revision_prompt.md
          model: gpt-5.4-mini
          effort: medium
          codex-args: '--config web_search="disabled"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/revision_summary.md
          codex-home: .github/codex/home/revision
          safety-strategy: unsafe
      # ----------------------------------------------------------------

      - name: Create patch artifact
        id: diff
        env:
          OUTPUT_DIR: ${{ needs.vars.outputs.output_dir }}
        run: |
          set -euo pipefail

          outside_changes=$(git status --porcelain --untracked-files=all -- . ":(exclude)$OUTPUT_DIR")

          if [ -n "$outside_changes" ]; then
            echo "Unexpected changes outside $OUTPUT_DIR:" >&2
            printf '%s\n' "$outside_changes" >&2
            exit 1
          fi

          git add -N "$OUTPUT_DIR"
          git diff --binary HEAD -- "$OUTPUT_DIR" ":(exclude)$OUTPUT_DIR/build/**" > /tmp/codex.patch

          if [ -s /tmp/codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload patch artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex.patch
          path: /tmp/codex.patch
          if-no-files-found: error

      - name: Upload summary artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: application-summaries
          path: |
            .github/codex/runtime/generator_summary.md
            .github/codex/runtime/revision_summary.md
          if-no-files-found: error

  create_private_material_files:
    needs: vars
    permissions:
      contents: read
    uses: ./.github/workflows/create-private-material-files.yml
    secrets:
      PERSONAL_INFO_DK_TEX: ${{ secrets.PERSONAL_INFO_DK_TEX }}
      PERSONAL_INFO_SE_TEX: ${{ secrets.PERSONAL_INFO_SE_TEX }}

  render_documents:
    needs:
      - vars
      - generate_patch
      - create_private_material_files
    if: needs.generate_patch.outputs.has_patch == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/render-documents.yml
    with:
      output_dir: ${{ needs.vars.outputs.output_dir }}
      input_patch_artifact_name: codex.patch
      output_patch_artifact_name: rendered.patch
      private_material_artifact_name: ${{ needs.create_private_material_files.outputs.artifact_name }}

  select_patch_artifact:
    runs-on: ubuntu-latest

    needs:
      - generate_patch
      - render_documents

    if: always() && needs.generate_patch.outputs.has_patch == 'true'

    outputs:
      patch_artifact_name: ${{ steps.select.outputs.patch_artifact_name }}
      render_succeeded: ${{ steps.select.outputs.render_succeeded }}
      render_status_message: ${{ steps.select.outputs.render_status_message }}

    steps:
      - name: Select patch artifact
        id: select
        run: |
          set -euo pipefail

          if [ "${{ needs.render_documents.result }}" = "success" ] && [ "${{ needs.render_documents.outputs.has_patch }}" = "true" ]; then
            echo "patch_artifact_name=rendered.patch" >> "$GITHUB_OUTPUT"
            echo "render_succeeded=true" >> "$GITHUB_OUTPUT"
            echo "render_status_message=PDF rendering succeeded." >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.render_documents.result }}" = "success" ]; then
            echo "patch_artifact_name=codex.patch" >> "$GITHUB_OUTPUT"
            echo "render_succeeded=true" >> "$GITHUB_OUTPUT"
            echo "render_status_message=PDF rendering completed, but no rendered patch was produced. This PR uses the generated source patch." >> "$GITHUB_OUTPUT"
          else
            echo "patch_artifact_name=codex.patch" >> "$GITHUB_OUTPUT"
            echo "render_succeeded=false" >> "$GITHUB_OUTPUT"
            echo "render_status_message=PDF rendering failed in GitHub Actions. This PR contains the generated source files only; PDFs should be rendered manually after fixing the LaTeX issue." >> "$GITHUB_OUTPUT"
          fi

  open_pr:
    needs:
      - vars
      - generate_patch
      - render_documents
      - select_patch_artifact
    if: always() && needs.generate_patch.outputs.has_patch == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: read
    uses: ./.github/workflows/open-pr.yml
    with:
      issue_number: ${{ needs.vars.outputs.issue_number }}
      issue_title: ${{ needs.vars.outputs.issue_title }}
      branch_name: ${{ needs.vars.outputs.branch_name }}
      patch_artifact_name: ${{ needs.select_patch_artifact.outputs.patch_artifact_name }}
      summary_artifact_name: application-summaries
      pr_title: "Application materials: ${{ needs.vars.outputs.issue_title }}"
      commit_message: "Generate application materials for issue #${{ needs.vars.outputs.issue_number }}"
      labels: application-draft
      render_status_message: ${{ needs.select_patch_artifact.outputs.render_status_message }}
