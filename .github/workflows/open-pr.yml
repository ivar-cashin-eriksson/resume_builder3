name: Open Pull Request

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
      issue_title:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      patch_artifact_name:
        required: true
        type: string
      pr_title:
        required: true
        type: string
      commit_message:
        required: true
        type: string
      labels:
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  open_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download patch
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.patch_artifact_name }}
          path: /tmp/pr-patch

      - name: Apply patch
        env:
          PATCH_PATH: /tmp/pr-patch/${{ inputs.patch_artifact_name }}
        run: git apply --index "$PATCH_PATH"

      - name: Build pull request body
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_BODY_PATH: /tmp/pr_body.md
        run: bash .github/scripts/build_pr_body.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ inputs.branch_name }}
          title: ${{ inputs.pr_title }}
          commit-message: ${{ inputs.commit_message }}
          body-path: /tmp/pr_body.md
          labels: ${{ inputs.labels }}
