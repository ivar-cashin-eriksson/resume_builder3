name: Render LaTeX Test

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to generate materials for"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-application:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create unprivileged Codex user
        run: bash .github/scripts/setup_codex_user.sh

      - name: Load issue data
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: bash .github/scripts/load_issue_data.sh

      - name: Prepare application context and prompt files
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: bash .github/scripts/prepare_test_context.sh

      - name: Run listing briefing
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/test_prompt.md
          model: gpt-5.4-mini
          effort: low
          codex-args: '--config web_search="live"'
          sandbox: workspace-write
          output-file: .github/codex/runtime/test_summary.md
          safety-strategy: unprivileged-user
          codex-user: guest

      - name: Repair workspace permissions
        run: bash .github/scripts/repair_workspace_permissions.sh

      - name: Install LaTeX
        run: bash .github/scripts/install_latex.sh

      - name: Compile PDFs
        run: bash .github/scripts/compile_test_pdfs.sh

      - name: Copy PDFs to output directory
        run: bash .github/scripts/promote_pdfs.sh

      - name: Commit generated PDF
        run: bash .github/scripts/commit_pdfs.sh

      - name: Create application branch slug
        id: slug
        run: echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Build pull request body
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: bash .github/scripts/build_pr_body.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.slug.outputs.branch }}
          title: "Application materials: ${{ steps.issue.outputs.title }}"
          commit-message: "Generate application materials for issue #${{ steps.issue.outputs.number }}"
          body-path: .github/codex/runtime/pr_body.md
          labels: application-draft
