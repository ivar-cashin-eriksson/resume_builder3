name: Render LaTeX Test

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to generate materials for"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate_patch:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    outputs:
      has_patch: ${{ steps.diff.outputs.has_patch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load issue data
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: bash .github/scripts/load_issue_data.sh

      - name: Prepare application context and prompt files
        env:
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_LABELS: ${{ steps.issue.outputs.labels }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: bash .github/scripts/prepare_test_context.sh

      - name: Make test LaTeX
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.4-mini
          effort: low
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '--config web_search="disabled"'
          prompt-file: .github/codex/runtime/test_prompt.md
          
      - name: Create patch artifact
        id: diff
        run: |
          git add -N .
          git diff --binary HEAD > /tmp/codex.patch

          if [ -s /tmp/codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload patch artifact
        if: steps.diff.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codex.patch
          path: /tmp/codex.patch
          if-no-files-found: error

  open_pr:
    runs-on: ubuntu-latest
    needs: generate_patch
    if: needs.generate_patch.outputs.has_patch == 'true'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read issue metadata
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          issue_json="$(gh issue view "$ISSUE_NUMBER" --json number,title,body)"
          echo "number=$(echo "$issue_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$issue_json" | jq -r '.title')" >> "$GITHUB_OUTPUT"    

      - name: Download Codex patch
        uses: actions/download-artifact@v4
        with:
          name: codex.patch
          path: /tmp/codex-patch

      - name: Apply Codex patch
        run: git apply --index /tmp/codex-patch/codex.patch

      - name: Create application branch slug
        id: slug
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        run: |
          slug="$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-60)"

          branch="application/issue-${ISSUE_NUMBER}-${slug}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Build pull request body
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          PR_BODY_PATH: /tmp/pr_body.md
        run: bash .github/scripts/build_pr_body.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.slug.outputs.branch }}
          title: "Application materials: ${{ steps.issue.outputs.title }}"
          commit-message: "Generate application materials for issue #${{ steps.issue.outputs.number }}"
          body-path: /tmp/pr_body.md
          labels: application-draft
