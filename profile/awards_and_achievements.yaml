  - name: IYPT Sweden
    description: Member of team Sweden in the International Young Physicists' Tournament (IYPT). A prestigious experimental physics competition for high school students across the world. Participants research 17 open-ended problems. The research culminates in the teams presenting their solutions at the international competition in front of a live audience. I conducted experiments on the Magnus effect, brownian motion of bristled objects on a vibrating surface, and the physics of light refracting through water bottles.
    year: 2015
    role: Team Member
