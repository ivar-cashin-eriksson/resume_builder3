awards:
  - name: Valcon People's Choice Award
    description: For exemplary work, leadership, team spirit, and scientific curiosity.
    year: 2023
    nominations:
    - "This nomination could be for the absolute 'joy' it is working together with him, and 'can do' attitude on a project in an unfamiliar setting, with short deadline and almost unlimited scope, however, this will be for his curiosity. Absolute pleasure to work with someone who is always exploring the limits of what data can do to solve complex business problems, and his ability to explain and utilize these findings to both client and project members."
    - "Exemplary and invaluable, he is a beacon of support and knowledge in every endeavor. His selflessness is truly inspiring, as he effortlessly navigates through various projects, lending a hand wherever needed."
    - "Ivar for always being open for a discussion and shared learning - thanks!"
    - "As he was a super great senior data scientist to work with. He always shares his experience and brought the strong attitude of 'Can do', everything is possible to do in Python. He trained me well on the coding project we worked together."
    - "It is a pleasure to see how Ivar embodies our Curious value. He will dig into topics and explain them in a fun and enlightening way. It doesn't matter if the topic is heavy data science like SHAP or why the colour 'pink' doesn't actually exist."

