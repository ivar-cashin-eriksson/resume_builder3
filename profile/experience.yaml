- organisation: RaySearch Laboratories
  location: Stockholm, Sweden
  period: 2019--2021
  title: Data Scientist, Researcher
  summary: Worked on automating radiotherapy planning using deep learning, probabilistic modelling, and
    multi-objective optimisation.
  responsibilities:
  - Developed pipelines for extracting latent anatomical features from segmented 3D CT scans using autoencoders.
  - Built learned similarity metrics to identify similar patients from anatomical representations.
