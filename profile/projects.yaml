projects:
- name: Project iris
  stylised: "'Project iris' with monospace font"
  period: 2025--2025
  type: Solo project / startup exploration
  summary: End-to-end computer vision system for making product images on e-commerce sites interactive.
  description: Detects individual items in e-commerce imagery, embeds them semantically, and links similar
    products across a web store through a real-time browser overlay.
  startup_context:
  - Explored launching Project iris as a startup together with my sister through H&M's startup ecosystem.
  - Withdrew the application after market analysis showed that the market gap was not as large as initially envisioned.
  components:
  - YOLOv8 model for item detection.
  - OpenCLIP embeddings for semantic item representation.
  - FastAPI backend.
  - MongoDB persistence layer.
  - Qdrant vector index for similarity search.
  - Custom Chromium plug-in overlaying clickable links on web shop imagery in real time.
  - Dynamic scraping and indexing pipeline for arbitrary e-commerce sites.
  learning_goals:
  - fine-tuning deep learning models
  - practical ML engineering
  technologies:
  - YOLOv8
  - OpenCLIP
  - FastAPI
  - MongoDB
  - Qdrant
  - Chromium extension
  - web scraping
  - vector search
  domains:
  - computer vision
  - e-commerce
  - recommendation/linking systems
  - startup validation
  motivation:
  - Desire to learn more about ML engineering.
  - Interest in validating whether the technical product solved a real market gap.

- name: resume_builder3
  stylised: "'resume_builder3' with a monospace font"
  period: 2023--Present
  type: Solo project
  summary: A source-grounded resume builder and human-in-the-loop job-application workflow based on structured profile data and job descriptions.
  description: Users create a structured profile with their background, skills, and experiences. The system generates tailored CVs and cover letters for specific job applications, using profile YAML files and job descriptions as source material. It also produces evidence mappings and gap reports to keep major claims traceable and flag missing fit. The workflow includes a job-hunter agent that crawls the web for interesting adverts, sends a daily digest, waits for my response, and, if I respond positively, creates a GitHub issue tagged `job-application` that triggers a GitHub Action to prepare a new branch with listing information and application materials for review.
  components:
  - Structured YAML profile for user information.
  - Job description parsing module to extract key requirements.
  - Resume generation engine that tailors content based on the profile and job description.
  - Template system for formatting CVs and cover letters.
  - Evidence mapping from generated claims back to source profile files and previous examples.
  - Gap report generation to identify missing or weak fit before submission.
  - Job-hunter agent that crawls the web for interesting job adverts.
  - Daily digest generation with a wait-for-response step.
  - GitHub issue creation tagged `job-application` when a role is selected.
  - GitHub Action that asks Codex to create a new branch with listing information and application materials.
  - Pull request creation to `main` for later review.
  - Closing and archiving of the application issue after approved application.
  learning_goals:
  - agentic prompting and system design
  - practical NLP application development
  - agentic workflow automation
  - source-grounded generation
  - human-in-the-loop application workflows
  - template-based document generation
  technologies:
  - YAML
  - agentic workflows
  - GitHub Issues
  - GitHub Actions
  - Codex
  motivation:
  - Desire to learn more about agentic prompting and system design.
  - Wanting a new job.

