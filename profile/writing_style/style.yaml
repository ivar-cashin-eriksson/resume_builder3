style:
  voice:
    tone:
      - professional
      - curious
      - sincere
      - excited
      - british_english

    avoid:
      - hype
      - buzzwords
      - exaggerated_claims
      - corporate_jargon

    prefer:
      - concrete_examples
      - evidence_backed_claims
      - technical_precision
      - modest_confidence
      - direct_language

  sentence_style:
    average_length: medium

    characteristics:
      - mostly_simple_sentences
      - occasional_longer_explanatory_sentence
      - active_voice
      - minimal_adjectives
